{% extends "auth_base.html" %}
{% from 'partials/svg.html' import svg %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
  <div class="auth-wrap">
    <div class="card auth-card">
      <div class="card-header auth-head">
        <div class="d-flex align-items-center gap-2">
          {{ svg('lock') }}
          <div class="auth-title">Сброс пароля</div>
        </div>
        <div class="auth-subtitle">Введите новый пароль</div>
      </div>

      <div class="card-body">
        <form method="POST" class="auth-form">
          <div class="field">
            <label for="password">Новый пароль</label>
            <input id="password" name="password" type="password" class="input" autocomplete="new-password" required>
          </div>

          <div class="field">
            <label for="password2">Повторите пароль</label>
            <input id="password2" name="password2" type="password" class="input" autocomplete="new-password" required>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-action-primary btn-sm">Сохранить</button>
            <a href="{{ url_for('login') }}" class="btn btn-action btn-sm">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
