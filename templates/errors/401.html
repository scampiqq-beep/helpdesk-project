<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - Необходима авторизация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container error-401">
        <div class="error-code">401</div>
        <div class="error-title">Необходима авторизация</div>
        <div class="error-message">
            Для доступа к этой странице необходимо войти в систему. 
            Пожалуйста, авторизуйтесь или обратитесь к администратору.
        </div>
        <a href="{{ url_for('login') }}" class="error-btn">Войти в систему</a>
    </div>
</body>
</html>
