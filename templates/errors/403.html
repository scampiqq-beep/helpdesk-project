<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Доступ запрещен</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container error-403">
        <div class="error-code">403</div>
        <div class="error-title">Доступ запрещен</div>
        <div class="error-message">
            У вас нет прав для просмотра этой страницы. 
            Если вы считаете, что это ошибка, обратитесь к администратору.
        </div>
        <a href="{{ url_for('ticket_list') }}" class="error-btn">Вернуться к заявкам</a>
    </div>
</body>
</html>
