<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Внутренняя ошибка сервера</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container error-500">
        <div class="error-code">500</div>
        <div class="error-title">Внутренняя ошибка сервера</div>
        <div class="error-message">
            Произошла непредвиденная ошибка. Администрация уже уведомлена. 
            Попробуйте обновить страницу или вернуться позже.
        </div>
        <a href="{{ url_for('ticket_list') }}" class="error-btn">Вернуться к заявкам</a>
    </div>
</body>
</html>
