<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/error.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f3f5;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">Страница не найдена</div>
        <div class="error-message">
            Запрашиваемая страница не существует или была перемещена. 
            Проверьте правильность адреса или вернитесь в систему.
        </div>
        <a href="{{ url_for('ticket_list') }}" class="error-btn">Вернуться к заявкам</a>
    </div>
</body>
</html>
